<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Pro</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}

body{
  display:flex;
  height:100vh;
  background:#0f0f0f;
  color:white;
}

/* container */
.container{
  display:flex;
  width:100%;
}

/* sidebar */
.sidebar{
  width:260px;
  background:#111;
  padding:10px;
  overflow-y:auto;
}

.sidebar h2{margin-bottom:10px}

.chat-item{
  padding:8px;
  margin-bottom:5px;
  background:#222;
  cursor:pointer;
  border-radius:6px;
}

/* main */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* header */
.header{
  padding:10px;
  background:#111;
  display:flex;
  align-items:center;
}

.menu-btn{
  font-size:20px;
  cursor:pointer;
  margin-left:10px;
}

/* chat */
#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg{
  margin:6px 0;
  padding:10px;
  border-radius:10px;
  max-width:80%;
  word-wrap:break-word;
}

.user{
  background:#2563eb;
  margin-left:auto;
}

.bot{
  background:#333;
}

img{
  max-width:200px;
  border-radius:10px;
  margin-top:5px;
}

/* input */
.inputBox{
  display:flex;
  padding:10px;
  background:#111;
  gap:5px;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:5px;
}

button{
  padding:10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* mobile */
@media (max-width:768px){
  .sidebar{
    position:absolute;
    left:-260px;
    top:0;
    height:100%;
    transition:0.3s;
  }
  .sidebar.active{
    left:0;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="sidebar" id="sidebar">
    <h2>چت‌ها</h2>
    <button onclick="newChat()">+ چت جدید</button>
    <div id="chatList"></div>
  </div>

  <div class="main">

    <div class="header">
      <span class="menu-btn" onclick="toggleMenu()">☰</span>
      <h3>AI Chat</h3>
    </div>

    <div id="chat"></div>

    <div class="inputBox">
      <button onclick="uploadImage()">📎</button>
      <button onclick="genImage()">🖼</button>
      <input id="msg" placeholder="پیام بده..." onkeypress="if(event.key==='Enter') send()">
      <button onclick="send()">ارسال</button>
    </div>

  </div>
</div>

<script>
let chats = JSON.parse(localStorage.getItem("chats")) || {};
let currentChat = Object.keys(chats)[0] || "chat1";

// اگه خالی بود بساز
if(!chats[currentChat]){
  chats[currentChat]=[];
  saveChats();
}

function saveChats(){
  localStorage.setItem("chats", JSON.stringify(chats));
}

function renderChats(){
  const list=document.getElementById("chatList");
  list.innerHTML="";
  
  Object.keys(chats).forEach(name=>{
    const div=document.createElement("div");
    div.className="chat-item";
    div.innerText=name;

    div.onclick=()=>loadChat(name);

    // حذف چت
    div.oncontextmenu=(e)=>{
      e.preventDefault();
      if(confirm("حذف بشه؟")){
        delete chats[name];
        currentChat=Object.keys(chats)[0] || "chat1";
        if(!chats[currentChat]) chats[currentChat]=[];
        saveChats();
        renderChats();
        renderMessages();
      }
    };

    list.appendChild(div);
  });
}

function newChat(){
  const name="chat"+Date.now();
  chats[name]=[];
  currentChat=name;
  saveChats();
  renderChats();
  renderMessages();
}

function loadChat(name){
  currentChat=name;
  renderMessages();
}

function renderMessages(){
  const chatDiv=document.getElementById("chat");
  chatDiv.innerHTML="";

  (chats[currentChat] || []).forEach(m=>{
    if(m.type==="img"){
      addImage(m.src,false);
    }else{
      addMessage(m.text,m.type,false);
    }
  });

  scrollDown();
}

function scrollDown(){
  const chat=document.getElementById("chat");
  chat.scrollTop=chat.scrollHeight;
}

function addMessage(text,type,save=true){
  const chatDiv=document.getElementById("chat");

  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;

  chatDiv.appendChild(div);

  if(save){
    chats[currentChat].push({text,type});
    saveChats();
  }

  scrollDown();
}

function addImage(src,save=true){
  const chatDiv=document.getElementById("chat");

  const img=document.createElement("img");
  img.src=src;

  chatDiv.appendChild(img);

  if(save){
    chats[currentChat].push({type:"img",src});
    saveChats();
  }

  scrollDown();
}

function send(){
  const input=document.getElementById("msg");
  const text=input.value.trim();

  if(!text) return;

  addMessage(text,"user");
  input.value="";

  // پاسخ تستی (بعداً AI وصل میشه)
  setTimeout(()=>{
    addMessage("🤖 جواب تستی","bot");
  },500);
}

function genImage(){
  const input=document.getElementById("msg");
  const text=input.value.trim();
  if(!text) return;

  addMessage("🎨 در حال ساخت تصویر...","bot");

  const url="https://image.pollinations.ai/prompt/"+encodeURIComponent(text);
  addImage(url);
}

function uploadImage(){
  const fileInput=document.createElement("input");
  fileInput.type="file";
  fileInput.accept="image/*";

  fileInput.onchange=()=>{
    const file=fileInput.files[0];
    if(!file) return;

    const reader=new FileReader();
    reader.onload=e=>{
      addImage(e.target.result);
    };
    reader.readAsDataURL(file);
  };

  fileInput.click();
}

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

// init
renderChats();
renderMessages();

</script>

</body>
</html>
